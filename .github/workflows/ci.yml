name: Tests

on:
  - push
  - pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: [3.0, 3.1, 3.2, 3.3, 3.4, 4.0]
        graphql_version: ['~> 1.13', '~> 2.0']
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: ruby/setup-ruby@a99ac844649df2596b52b4db087cfa0881b172af # v1.311.0
      with:
        bundler-cache: true
        ruby-version: ${{ matrix.ruby }}
      env:
        GRAPHQL_VERSION: ${{ matrix.graphql_version }}
        GRAPHQL_FUTURE: ${{ (matrix.graphql_version == '~> 2.0' && matrix.ruby_version == 4.0 && 'YES') || 'NO' }}
    - run: bundle exec rake
